<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mini RPG</title>

<link rel="stylesheet"
href="style.css">

</head>
<body>

<h1>⚔ Mini RPG</h1>

<div class="layout">

    <div class="left">

        <div class="card">

            <h2>ผู้เล่น</h2>

            <div id="player"></div>
<div class="card">
 </div>
    <h2>🎒 กระเป๋า</h2>

    <div id="inventory"></div>

</div>

       

        <div class="card">

            <h2>สถานที่</h2>

            <div class="map">

                <button
                class="place"
                onclick="goPlace('slime_field')">

                    🟢 ทุ่งสไลม์

                </button>

                <button
                class="place"
                onclick="goPlace('goblin_forest')">

                    🌲 ป่าก็อบลิน

                </button>

                <button
                class="place"
                onclick="goPlace('dungeon')">

                    🏰 ดันเจี้ยน

                </button>

                <button
                class="place"
                onclick="goPlace('market')">

                    🛒 ตลาด

                </button>

            </div>

        </div>

    </div>

    <div class="right">

        <div class="card">

            <h2 id="locationName">

                ทุ่งสไลม์

            </h2>

            <div id="content"></div>

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
