<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Mini RPG</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:sans-serif;
    padding:20px;
}

.layout{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.left{
    width:320px;
}

.right{
    flex:1;
    min-width:300px;
}

.card{
    background:#1f2937;
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

.map{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.place{
    background:#374151;
    text-align:left;
    font-size:16px;
}

.monster{
    background:#374151;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.02);
}
</style>

</head>
<body>

<h1>⚔ Mini RPG</h1>

<div class="layout">

    <div class="left">

        <div class="card">

            <h2>ผู้เล่น</h2>

            <div id="player"></div>
<div class="card">
 </div>
    <h2>🎒 กระเป๋า</h2>

    <div id="inventory"></div>

</div>

       

        <div class="card">

            <h2>สถานที่</h2>

            <div class="map">

                <button
                class="place"
                onclick="goPlace('slime_field')">

                    🟢 ทุ่งสไลม์

                </button>

                <button
                class="place"
                onclick="goPlace('goblin_forest')">

                    🌲 ป่าก็อบลิน

                </button>

                <button
                class="place"
                onclick="goPlace('dungeon')">

                    🏰 ดันเจี้ยน

                </button>

                <button
                class="place"
                onclick="goPlace('market')">

                    🛒 ตลาด

                </button>

            </div>

        </div>

    </div>

    <div class="right">

        <div class="card">

            <h2 id="locationName">

                ทุ่งสไลม์

            </h2>

            <div id="content"></div>

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
